name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel and test dependencies
        run: python -m pip install dist/feynpy-0.1.0-py3-none-any.whl "pytest>=8,<9"

      - name: Smoke-test installed packages
        working-directory: ${{ runner.temp }}
        run: |
          python - <<'PY'
          from importlib.resources import files
          from symbolic.tensor_canonicalization import canonize_full

          assert callable(canonize_full)
          import compiler
          import feynpy
          import feynrules
          import lagrangian
          import models.SM
          import models.UnbrokenSM_BFM
          import symbolic
          from feynpy import Field, Model, Parameter

          sm_reference = (
              files("models.SM")
              / "reference"
              / "feynrules"
              / "sm_vertices_FeynRules.json"
          )
          bfm_reference = (
              files("models.UnbrokenSM_BFM")
              / "reference"
              / "feynrules"
              / "LSM_full_FeynRules.json"
          )
          assert sm_reference.is_file()
          assert bfm_reference.is_file()

          phi = Field("phi", spin=0, self_conjugate=True)
          coupling = Parameter("g")
          model = Model(
              coupling * phi * phi * phi,
              fields=(phi,),
              parameters=(coupling,),
          )
          assert model.feynman_rule(phi, phi, phi) is not None
          PY

      - name: Run test suite
        run: python -m pytest -q
